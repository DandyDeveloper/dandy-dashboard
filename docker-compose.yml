services:
  server:
    container_name: server
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    environment:
      DATA_DIR: /data
      GOOGLE_CREDENTIALS_JSON: /data/google_credentials.json
    volumes:
      - dashboard_data:/data
      - ./data/google_credentials.json:/data/google_credentials.json:ro
    depends_on:
      redis:
        condition: service_healthy
        required: false
    restart: unless-stopped

  web:
    container_name: web
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped

  # Optional external store — enable by setting STORE_URL=redis://redis:6379 in .env
  # and running: docker compose --profile redis up
  redis:
    image: redis:7-alpine
    container_name: redis
    profiles:
      - redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  dashboard_data:
  redis_data:
