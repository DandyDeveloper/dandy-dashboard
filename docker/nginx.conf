server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy all API calls to the Go backend.
    # proxy_buffering must be off so Claude's SSE stream reaches the browser
    # without being held in Nginx's buffer.
    location /api/ {
        proxy_pass         http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # SSE / streaming support
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     600s;
        chunked_transfer_encoding on;
    }

    # SPA fallback — serve index.html for any path not matched above so that
    # client-side routing works on hard refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
